<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Kitchen Display</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<link rel="stylesheet" href="/css/theme.css">
<link rel="stylesheet" href="/css/nav.css">
<style>

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
  }
  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--offline);
  }
  .dot.live { background: var(--ok); box-shadow: 0 0 8px var(--ok); }

  #board {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
    padding: 24px;
  }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--muted);
    padding: 80px 20px;
    font-size: 15px;
  }

  .ticket {
    background: var(--ticket);
    color: var(--ink);
    border-radius: 2px;
    box-shadow: 0 6px 0 var(--ticket-edge), 0 8px 16px rgba(0,0,0,0.4);
    padding: 16px 16px 14px;
    position: relative;
    animation: drop 0.25s ease-out;
  }
  @keyframes drop {
    from { transform: translateY(-12px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .ticket::before {
    content: "";
    position: absolute;
    top: -6px; left: 14px; right: 14px;
    height: 6px;
    background: repeating-linear-gradient(90deg, var(--bg) 0 8px, transparent 8px 14px);
  }
  .ticket-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px dashed var(--ticket-edge);
    padding-bottom: 8px;
    margin-bottom: 10px;
  }
  .ticket-table {
    font-family: var(--font-display);
    font-weight: bold;
    font-size: 18px;
  }
  .ticket-time {
    font-size: 11px;
    color: var(--paper-muted);
  }
  .ticket-type {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 2px;
    background: var(--ink);
    color: var(--ticket);
    margin-bottom: 8px;
  }
  .item-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 6px 0;
    border-bottom: 1px solid rgba(0,0,0,0.07);
    gap: 8px;
  }
  .item-row:last-of-type { border-bottom: none; }
  .item-name {
    font-weight: 600;
    font-size: 14px;
  }
  .item-qty {
    font-family: var(--font-display);
    font-weight: bold;
    color: var(--accent);
    min-width: 24px;
  }
  .item-note {
    font-size: 11px;
    color: var(--paper-muted);
    font-style: italic;
    margin-top: 2px;
  }
  .item-status-row { display: flex; align-items: center; gap: 6px; }
  select.status-select {
    font-size: 11px;
    border: 1px solid var(--ticket-edge);
    background: var(--paper);
    border-radius: 3px;
    padding: 2px 4px;
    font-family: var(--font-body);
  }
  .status-PENDING { color: var(--warn); }
  .status-COOKING { color: var(--cooking) }
  .status-SERVED { color: var(--ok); }
</style>
</head>
<body>

<header>

  <h1>🔥 Kitchen Display</h1>

  <div class="status">

    <div id="nav-container"></div>

    <span class="dot" id="dot"></span>
    <span id="status-text">connecting…</span>

    <button class="btn btn-ghost" onclick="logout()">
    Logout
    </button>

  </div>

</header>

<div id="board">
  <div class="empty-state">Waiting for orders…</div>
</div>

<script src="/js/nav.js"></script>

<script>

function logout() {
    socket.disconnect();

    localStorage.removeItem("pos_token");
    localStorage.removeItem("pos_role");
    localStorage.removeItem("pos_user");

    window.location.href="/index.html";
}

  // ---- CONFIG: change if your server runs elsewhere ----
  const API_BASE = window.location.origin;
  const TOKEN = localStorage.getItem("pos_token");
  if (!TOKEN) window.location.href = "/";

  const board = document.getElementById("board");
  const dot = document.getElementById("dot");
  const statusText = document.getElementById("status-text");

  const socket = io(API_BASE);

  socket.on("connect", () => {
    dot.classList.add("live");
    statusText.textContent = "live";
    socket.emit("join-kitchen");
    loadOrders();
  });

  socket.on("disconnect", () => {
    dot.classList.remove("live");
    statusText.textContent = "disconnected";
  });

  socket.on("new-order", loadOrders);
  socket.on("new-order-item", loadOrders);
  socket.on("order-item-status-changed", loadOrders);
  socket.on("order-item-updated", loadOrders);

  async function loadOrders() {
    try {
      const res = await fetch(`${API_BASE}/kitchen/orders`, {
        headers: { Authorization: `Bearer ${TOKEN}` }
      });
      if (res.status === 401) {
        logout();
        return;
      }

      if (!res.ok) {
        throw new Error("Unable to load kitchen orders.");
      }

const orders = await res.json();
      renderOrders(orders);
    } catch (err) {
      console.error("Failed to load orders", err);
    }
  }

  function renderOrders(orders) {
    if (!orders || orders.length === 0) {
      board.innerHTML = `<div class="empty-state">No active orders. Kitchen is clear.</div>`;
      return;
    }

    board.innerHTML = orders.map(order => {
      const tableLabel = order.table ? `Table ${order.table.tableNumber}` : order.orderType.replace("_", " ");
      const time = new Date(order.createdAt).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

      const items = order.orderItems.map(item => `
        <div class="item-row">
          <div>
            <div><span class="item-qty">${item.quantity}×</span> <span class="item-name">${escapeHtml(item.menuItem.name)}</span></div>
            ${item.notes ? `<div class="item-note">"${escapeHtml(item.notes)}"</div>` : ""}
          </div>
          <div class="item-status-row">
            <select class="status-select status-${item.status}" data-item-id="${item.id}">
              <option value="PENDING" ${item.status === "PENDING" ? "selected" : ""}>Pending</option>
              <option value="COOKING" ${item.status === "COOKING" ? "selected" : ""}>Cooking</option>
              <option value="SERVED" ${item.status === "SERVED" ? "selected" : ""}>Served</option>
            </select>
            <button onclick="openVoidModal('${item.id}', '${escapeHtml(item.menuItem.name)}')" style="margin-left:4px;padding:3px 6px;border:1px solid var(--danger);background:transparent;color:var(--danger);border-radius:3px;font-size:10px;cursor:pointer">Void</button>
          </div>
        </div>
      `).join("");

      return `
        <div class="ticket">
          <span class="ticket-type">${escapeHtml(order.orderType.replace("_", " "))}</span>
          <div class="ticket-head">
            <span class="ticket-table">${escapeHtml(tableLabel)}</span>
            <span class="ticket-time">${time}</span>
          </div>
          ${items}
        </div>
      `;
    }).join("");

    document.querySelectorAll(".status-select").forEach(sel => {
      sel.addEventListener("change", async (e) => {
        const itemId = e.target.getAttribute("data-item-id");
        const newStatus = e.target.value;
try {
    sel.disabled = true;

    const res = await fetch(`${API_BASE}/order-items/${itemId}/status`, {
        method: "PATCH",
        headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${TOKEN}`
        },
        body: JSON.stringify({ status: newStatus })
    });

    if (res.status === 401) {
        logout();
        return;
    }

    if (!res.ok) {
        throw new Error("Failed to update status.");
    }

} catch (err) {
    alert(err.message);
    loadOrders();
} finally {
    sel.disabled = false;
}
      });
    });
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  loadOrders();

  let voidingItemId = null;

function openVoidModal(itemId, itemName) {
  voidingItemId = itemId;
  document.getElementById("void-item-name").textContent = itemName;
  document.getElementById("void-reason").value = "";
  document.getElementById("void-pin").value = "";
  document.getElementById("void-modal").style.display = "flex";
}

function closeVoidModal() {
  document.getElementById("void-modal").style.display = "none";
  voidingItemId = null;
}

async function confirmVoid() {
  const reason = document.getElementById("void-reason").value.trim();
  const approverPin = document.getElementById("void-pin").value.trim();
  if (!reason) { alert("Please enter a reason."); return; }
  if (!approverPin) { alert("Manager/Admin PIN required."); return; }

  try {
    const res = await fetch(`${API_BASE}/order-items/${voidingItemId}/void`, {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: `Bearer ${TOKEN}` },
      body: JSON.stringify({ reason, approverPin })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Void failed");
    closeVoidModal();
    loadOrders();
  } catch (err) {
    alert(err.message);
  }
}

</script>

<!-- Void Modal -->
<div id="void-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;align-items:center;justify-content:center;padding:16px">
  <div style="background:#1d2326;border:1px solid #2a3033;border-radius:10px;padding:24px;width:100%;max-width:380px">
    <h3 style="margin:0 0 16px;color:#eee;font-family:var(--font-body,sans-serif);font-size:16px">Void Item</h3>
    <div id="void-item-name" style="color:#8a9296;font-size:13px;margin-bottom:14px"></div>
    <label style="display:block;font-size:11px;color:#8a9296;text-transform:uppercase;margin-bottom:5px">Reason</label>
    <input type="text" id="void-reason" placeholder="e.g. wrong order, customer changed mind" style="width:100%;padding:9px;border-radius:5px;border:1px solid #2a3033;background:#1a2022;color:#eee;margin-bottom:14px;box-sizing:border-box" />
    <label style="display:block;font-size:11px;color:#8a9296;text-transform:uppercase;margin-bottom:5px">Manager/Admin PIN</label>
    <input type="password" id="void-pin" placeholder="4-digit PIN" maxlength="4" style="width:100%;padding:9px;border-radius:5px;border:1px solid #2a3033;background:#1a2022;color:#eee;margin-bottom:18px;box-sizing:border-box" />
    <div style="display:flex;gap:8px">
      <button onclick="closeVoidModal()" style="flex:1;padding:10px;border:none;border-radius:5px;background:#2a3336;color:#eee;cursor:pointer">Cancel</button>
      <button onclick="confirmVoid()" style="flex:1;padding:10px;border:none;border-radius:5px;background:#c4452b;color:#fff;cursor:pointer;font-weight:600">Void Item</button>
    </div>
  </div>
</div>

</body>
</html>
