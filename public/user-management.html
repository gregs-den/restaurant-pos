<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>User Management</title>
<style>
  :root {
    --bg: #14181a;
    --panel: #1d2326;
    --card: #232a2d;
    --border: #2a3033;
    --accent: #2d8f5f;
    --accent-dark: #1f6e47;
    --danger: #c4452b;
    --warn: #e0a72e;
    --muted: #8a9296;
    --font-display: 'Courier New', monospace;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); font-family: var(--font-body); color: #eee; min-height: 100vh; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    background: var(--panel);
    border-bottom: 3px solid var(--accent);
  }
  header h1 { font-family: var(--font-display); letter-spacing: 2px; font-size: 20px; margin: 0; text-transform: uppercase; }

  .main { padding: 28px; }
  .main-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .main-head h2 { margin: 0; font-size: 16px; color: var(--muted); font-weight: 400; }

  /* ---- Role tabs ---- */
  .role-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .role-tab {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
  }
  .role-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ---- User cards ---- */
  .users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .user-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
    position: relative;
  }
  .user-card:hover { border-color: #3a4448; }
  .user-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 12px;
    font-family: var(--font-display);
  }
  .avatar-ADMIN { background: #2d3a6e; color: #9b9ef7; }
  .avatar-MANAGER { background: #3a2d6e; color: #c49ef7; }
  .avatar-CASHIER { background: #1f3a2a; color: #6fcf97; }
  .avatar-WAITER { background: #3a2a1f; color: #f2994a; }

  .user-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .user-email { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .role-badge {
    display: inline-block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-bottom: 10px;
  }
  .role-ADMIN { background: #2d3a6e; color: #9b9ef7; }
  .role-MANAGER { background: #3a2d6e; color: #c49ef7; }
  .role-CASHIER { background: #1f3a2a; color: #6fcf97; }
  .role-WAITER { background: #3a2a1f; color: #f2994a; }

  .user-meta { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .user-meta span { margin-right: 12px; }
  .pin-display { font-family: var(--font-display); }

  .user-actions { display: flex; gap: 8px; }
  .btn {
    padding: 7px 14px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font-body);
    font-weight: 500;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-dark); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-ghost { background: #2a3336; color: #eee; }
  .btn-ghost:hover { background: #333d41; }

  .empty-state { text-align: center; color: var(--muted); padding: 60px 20px; grid-column: 1/-1; }

  /* ---- Modal ---- */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    width: 100%;
    max-width: 440px;
  }
  .modal h3 { margin: 0 0 20px; font-size: 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
  .field input, .field select {
    width: 100%;
    padding: 9px 10px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: #1a2022;
    color: #eee;
    font-size: 14px;
    font-family: var(--font-body);
  }
  .field .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--accent-dark); color: #fff;
    padding: 10px 20px; border-radius: 6px; font-size: 13px;
    opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 200;
  }
  .toast.show { opacity: 1; }

  /* ---- Stats bar ---- */
  .stats-bar { display: flex; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 16px;
    font-size: 13px;
  }
  .stat-chip .num { font-family: var(--font-display); font-size: 20px; font-weight: bold; color: var(--accent); }
  .stat-chip .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>

<header>
  <h1>👥 User Management</h1>
  <button class="btn btn-primary" onclick="openModal()">+ Add Staff</button>
</header>

<div class="main">
  <!-- Stats -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- Role filter tabs -->
  <div class="role-tabs">
    <div class="role-tab active" data-role="ALL">All Staff</div>
    <div class="role-tab" data-role="ADMIN">Admin</div>
    <div class="role-tab" data-role="MANAGER">Manager</div>
    <div class="role-tab" data-role="CASHIER">Cashier</div>
    <div class="role-tab" data-role="WAITER">Waiter</div>
  </div>

  <!-- Users grid -->
  <div class="users-grid" id="users-grid">
    <div class="empty-state">Loading…</div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-bg" id="user-modal">
  <div class="modal">
    <h3 id="modal-title">Add Staff</h3>
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="u-name" placeholder="e.g. Juan dela Cruz" />
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="u-email" placeholder="juan@restaurant.com" />
    </div>
    <div class="field">
      <label id="pw-label">Password</label>
      <input type="password" id="u-password" placeholder="min. 6 characters" />
      <div class="hint" id="pw-hint"></div>
    </div>
    <div class="field">
      <label>PIN <span style="font-weight:400;text-transform:none">(4 digits, for quick login)</span></label>
      <input type="text" id="u-pin" placeholder="e.g. 1234" maxlength="4" />
      <div class="hint">Leave blank to disable PIN login for this staff.</div>
    </div>
    <div class="field">
      <label>Role</label>
      <select id="u-role">
        <option value="WAITER">Waiter</option>
        <option value="CASHIER">Cashier</option>
        <option value="MANAGER">Manager</option>
        <option value="ADMIN">Admin</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser()">Save</button>
    </div>
  </div>
</div>

<!-- Confirm Deactivate Modal -->
<div class="modal-bg" id="confirm-modal">
  <div class="modal">
    <h3>Deactivate Staff?</h3>
    <p id="confirm-msg" style="color:var(--muted);font-size:14px"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok-btn">Deactivate</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

  const API_BASE = window.location.origin;
  const TOKEN = localStorage.getItem("pos_token");
  if (!TOKEN) window.location.href = "/";

  let users = [];
  let activeRole = "ALL";
  let editingId = null;

  async function api(path, options = {}) {
    const res = await fetch(`${API_BASE}${path}`, {
      ...options,
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${TOKEN}`,
        ...(options.headers || {})
      }
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Request failed");
    return data;
  }

  async function loadUsers() {
    try {
      users = await api("/users");
      renderStats();
      renderUsers();
    } catch (err) {
      document.getElementById("users-grid").innerHTML = `<div class="empty-state">Failed to load users.</div>`;
    }
  }

  function renderStats() {
    const roles = ["ADMIN", "MANAGER", "CASHIER", "WAITER"];
    const total = users.length;
    document.getElementById("stats-bar").innerHTML = `
      <div class="stat-chip"><div class="num">${total}</div><div class="lbl">Total Staff</div></div>
      ${roles.map(r => `
        <div class="stat-chip">
          <div class="num" style="color:var(--accent)">${users.filter(u => u.role === r).length}</div>
          <div class="lbl">${r}</div>
        </div>
      `).join("")}
    `;
  }

  function renderUsers() {
    const grid = document.getElementById("users-grid");
    const filtered = activeRole === "ALL" ? users : users.filter(u => u.role === activeRole);

    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state">No ${activeRole === "ALL" ? "" : activeRole.toLowerCase() + " "}staff found.</div>`;
      return;
    }

    grid.innerHTML = filtered.map(u => `
      <div class="user-card">
        <div class="user-avatar avatar-${u.role}">${u.name.charAt(0).toUpperCase()}</div>
        <div class="user-name">${escapeHtml(u.name)}</div>
        <div class="user-email">${escapeHtml(u.email)}</div>
        <div class="role-badge role-${u.role}">${u.role}</div>
        <div class="user-meta">
          <span>📅 ${new Date(u.createdAt).toLocaleDateString()}</span>
          ${u.pin ? `<span class="pin-display">🔑 PIN: ${escapeHtml(u.pin)}</span>` : `<span style="opacity:0.5">No PIN</span>`}
        </div>
        <div class="user-actions">
          <button class="btn btn-ghost" onclick="editUser('${u.id}')">✏️ Edit</button>
          <button class="btn btn-danger" onclick="confirmDeactivate('${u.id}', '${escapeHtml(u.name)}')">Deactivate</button>
        </div>
      </div>
    `).join("");
  }

  // ---- Role tabs ----
  document.querySelectorAll(".role-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".role-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      activeRole = tab.getAttribute("data-role");
      renderUsers();
    });
  });

  // ---- Modal ----
  function openModal(prefill = null) {
    editingId = prefill ? prefill.id : null;
    document.getElementById("modal-title").textContent = prefill ? "Edit Staff" : "Add Staff";
    document.getElementById("u-name").value = prefill ? prefill.name : "";
    document.getElementById("u-email").value = prefill ? prefill.email : "";
    document.getElementById("u-password").value = "";
    document.getElementById("u-pin").value = prefill ? (prefill.pin || "") : "";
    document.getElementById("u-role").value = prefill ? prefill.role : "WAITER";

    const pwLabel = document.getElementById("pw-label");
    const pwHint = document.getElementById("pw-hint");
    if (prefill) {
      pwLabel.textContent = "New Password";
      pwHint.textContent = "Leave blank to keep existing password.";
    } else {
      pwLabel.textContent = "Password";
      pwHint.textContent = "";
    }
    document.getElementById("user-modal").classList.add("open");
  }

  function closeModal() { document.getElementById("user-modal").classList.remove("open"); }

  function editUser(id) {
    const user = users.find(u => u.id === id);
    if (user) openModal(user);
  }

  async function saveUser() {
    const name = document.getElementById("u-name").value.trim();
    const email = document.getElementById("u-email").value.trim();
    const password = document.getElementById("u-password").value;
    const pin = document.getElementById("u-pin").value.trim();
    const role = document.getElementById("u-role").value;

    if (!name) { showToast("Name is required."); return; }
    if (!email) { showToast("Email is required."); return; }
    if (!editingId && !password) { showToast("Password is required."); return; }
    if (!editingId && password.length < 6) { showToast("Password must be at least 6 characters."); return; }
    if (pin && (pin.length !== 4 || !/^\d{4}$/.test(pin))) { showToast("PIN must be exactly 4 digits."); return; }

    const body = { name, email, role, pin: pin || "" };
    if (password) body.password = password;

    try {
      if (editingId) {
        await api(`/users/${editingId}`, { method: "PUT", body: JSON.stringify(body) });
        showToast("Staff updated.");
      } else {
        body.password = password;
        await api("/users", { method: "POST", body: JSON.stringify(body) });
        showToast("Staff added.");
      }
      closeModal();
      await loadUsers();
    } catch (err) { showToast(err.message); }
  }

  // ---- Deactivate ----
  function confirmDeactivate(id, name) {
    document.getElementById("confirm-msg").textContent = `${name} will be deactivated and won't be able to log in.`;
    document.getElementById("confirm-ok-btn").onclick = async () => {
      try {
        await api(`/users/${id}`, { method: "DELETE" });
        showToast(`${name} deactivated.`);
        closeConfirm();
        await loadUsers();
      } catch (err) { showToast(err.message); }
    };
    document.getElementById("confirm-modal").classList.add("open");
  }

  function closeConfirm() { document.getElementById("confirm-modal").classList.remove("open"); }

  // ---- Helpers ----
  function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2500);
  }

  function escapeHtml(str) {
    if (!str) return "";
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  document.querySelectorAll(".modal-bg").forEach(bg => {
    bg.addEventListener("click", e => { if (e.target === bg) bg.classList.remove("open"); });
  });

  loadUsers();
</script>
</body>
</html>
