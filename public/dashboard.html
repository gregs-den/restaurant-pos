<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Admin Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<link rel="stylesheet" href="/css/theme.css">
<link rel="stylesheet" href="/css/nav.css">
<style>

  .live-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); display: inline-block; margin-right: 6px; }
  .header-right { display: flex; align-items: center; gap: 16px; font-size: 13px; color: var(--muted); }
  #clock { font-family: var(--font-display); font-size: 15px; color: var(--text);; }

  .main { padding: 24px 28px; }

  /* ---- KPI row ---- */
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .kpi::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--kpi-color, var(--accent));
  }
  .kpi .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 8px; }
  .kpi .value { font-family: var(--font-display); font-size: 28px; font-weight: bold; color: var(--kpi-color, var(--accent)); }
  .kpi .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* ---- Grid layout ---- */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }
  .card h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin: 0 0 16px; }

  /* ---- Hourly chart ---- */
  .chart-wrap { height: 160px; display: flex; align-items: flex-end; gap: 3px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
  .bar {
    width: 100%;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
    min-height: 2px;
    transition: height 0.4s ease;
    position: relative;
  }
  .bar:hover::after {
    content: attr(data-label);
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: #000;
    color: #fff;
    font-size: 10px;
    padding: 2px 5px;
    border-radius: 3px;
    white-space: nowrap;
    margin-bottom: 3px;
  }
  .bar-hour { font-size: 9px; color: var(--muted); }

  /* ---- Tables grid ---- */
  .tables-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
  .table-chip {
    border-radius: 6px;
    padding: 10px 6px;
    text-align: center;
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: bold;
    border: 2px solid transparent;
  }
  .table-chip.AVAILABLE { background: #1f3a2a; color: var(--ok); border-color: #2d6b4a; }
  .table-chip.OCCUPIED { background: #3a2a1f; color: #f2994a; border-color: #6b4a2d; }
  .table-chip.RESERVED { background: #2a2a3a; color: #9b9ef7; border-color: #4a4a6b; }
  .table-chip.BILLING { background: #3a1f1f; color: #eb5757; border-color: #6b2d2d; }
  .table-chip .table-status { font-size: 9px; font-family: var(--font-body); margin-top: 3px; opacity: 0.8; }

  /* ---- Top items ---- */
  .top-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .top-item:last-child { border-bottom: none; }
  .top-rank { font-family: var(--font-display); font-size: 18px; font-weight: bold; color: var(--border); width: 28px; }
  .top-rank.r1 { color: #f7c948; }
  .top-rank.r2 { color: #b0b8bf; }
  .top-rank.r3 { color: #cd7f32; }
  .top-name { flex: 1; font-size: 14px; }
  .top-qty { font-family: var(--font-display); font-size: 13px; color: var(--accent); }
  .top-bar-wrap { width: 80px; height: 6px; background: var(--border); border-radius: 3px; }
  .top-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; }

  /* ---- Legend ---- */
  .legend { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .refresh-note { text-align: right; font-size: 11px; color: var(--muted); margin-bottom: 16px; }
</style>
</head>
<body>

<header>
    <h1>📊 Admin Dashboard</h1>

    <div class="header-right">

        <div id="nav-container"></div>

        <span>
            <span class="live-dot"></span>live
        </span>

        <span id="clock"></span>

        <button class="btn btn-ghost" onclick="logout()">
          Logout
        </button>

    </div>
</header>

<div class="main">
  <div class="refresh-note" id="last-refresh">Loading…</div>

  <!-- KPIs -->
  <div class="kpi-row" id="kpi-row">
    <div class="kpi" style="--kpi-color: var(--accent)"><div class="label">Today's Revenue</div><div class="value" id="kpi-revenue">…</div><div class="sub">paid orders only</div></div>
    <div class="kpi" style="--kpi-color: #4a9edd"><div class="label">Orders Today</div><div class="value" id="kpi-orders">…</div><div class="sub">completed</div></div>
    <div class="kpi" style="--kpi-color: var(--warn)"><div class="label">Avg. Ticket</div><div class="value" id="kpi-avg">…</div><div class="sub">per order</div></div>
    <div class="kpi" style="--kpi-color: var(--accent2)"><div class="label">Tables Occupied</div><div class="value" id="kpi-tables">…</div><div class="sub" id="kpi-tables-sub">of 0 total</div></div>
  </div>

  <div class="grid-2">
    <!-- Hourly chart -->
    <div class="card">
      <h2>Hourly Sales — Today</h2>
      <div class="chart-wrap" id="hourly-chart"></div>
    </div>

    <!-- Top items -->
    <div class="card">
      <h2>Top Selling Items</h2>
      <div id="top-items"></div>
    </div>
  </div>

  <!-- Table status -->
  <div class="card">
    <h2>Table Status</h2>
    <div class="tables-grid" id="tables-grid"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#6fcf97"></div> Available</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f2994a"></div> Occupied</div>
      <div class="legend-item"><div class="legend-dot" style="background:#9b9ef7"></div> Reserved</div>
      <div class="legend-item"><div class="legend-dot" style="background:#eb5757"></div> Billing</div>
    </div>
  </div>
</div>

<script src="/js/nav.js"></script>

<script>

  function logout() {
  localStorage.removeItem("pos_token");
  localStorage.removeItem("pos_role");
  localStorage.removeItem("pos_user");
  window.location.href = "/index.html";
}

  const API_BASE = window.location.origin;
  const TOKEN = localStorage.getItem("pos_token");
  if (!TOKEN) window.location.href = "/";

  // Clock
  function updateClock() {
    document.getElementById("clock").textContent = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Socket for live refresh
  const socket = io(API_BASE);
  socket.on("connect", () => socket.emit("join-kitchen"));
  socket.on("new-order", loadStats);
  socket.on("new-order-item", loadStats);
  socket.on("order-item-status-changed", loadStats);

  // Auto-refresh every 60 seconds
  setInterval(loadStats, 60000);

  async function loadStats() {
    try {
      const res = await fetch(`${API_BASE}/dashboard/stats`, {
        headers: { Authorization: `Bearer ${TOKEN}` }
      });
      const data = await res.json();
      renderStats(data);
      document.getElementById("last-refresh").textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
    } catch (err) {
      console.error("Failed to load stats", err);
    }
  }

  function renderStats(data) {
    // KPIs
    document.getElementById("kpi-revenue").textContent = `₱${data.totalRevenue.toFixed(2)}`;
    document.getElementById("kpi-orders").textContent = data.totalOrders;
    document.getElementById("kpi-avg").textContent = `₱${data.avgTicket.toFixed(2)}`;
    document.getElementById("kpi-tables").textContent = `${data.tables.occupied}`;
    document.getElementById("kpi-tables-sub").textContent = `of ${data.tables.total} total`;

    // Hourly chart
    const maxSales = Math.max(...data.hourly.map(h => h.sales), 1);
    const now = new Date().getHours();
    document.getElementById("hourly-chart").innerHTML = data.hourly.map(h => `
      <div class="bar-col">
        <div class="bar" style="height:${Math.max(2, (h.sales / maxSales) * 140)}px; opacity:${h.hour > now ? 0.2 : 1}; background:${h.hour === now ? 'var(--accent2)' : 'var(--accent)'};"
          data-label="₱${h.sales.toFixed(0)}"></div>
        <div class="bar-hour">${h.hour === 0 ? '12a' : h.hour < 12 ? h.hour+'a' : h.hour === 12 ? '12p' : (h.hour-12)+'p'}</div>
      </div>
    `).join("");

    // Top items
    const maxQty = Math.max(...data.topSelling.map(i => i.quantity), 1);
    document.getElementById("top-items").innerHTML = data.topSelling.length
      ? data.topSelling.map((item, idx) => `
          <div class="top-item">
            <div class="top-rank ${idx === 0 ? 'r1' : idx === 1 ? 'r2' : idx === 2 ? 'r3' : ''}">#${idx + 1}</div>
            <div class="top-name">${escapeHtml(item.name)}</div>
            <div class="top-bar-wrap"><div class="top-bar-fill" style="width:${(item.quantity / maxQty) * 100}%"></div></div>
            <div class="top-qty">${item.quantity}×</div>
          </div>
        `).join("")
      : `<div style="color:var(--muted);font-size:13px">No sales data yet.</div>`;

    // Tables
    document.getElementById("tables-grid").innerHTML = data.tables.total === 0
      ? `<div style="color:var(--muted);font-size:13px">No tables set up yet.</div>`
      : "";

    // We need actual table list — reload from /tables
    loadTables();
  }

  async function loadTables() {
    try {
      const res = await fetch(`${API_BASE}/tables`, {
        headers: { Authorization: `Bearer ${TOKEN}` }
      });
      const tables = await res.json();
      document.getElementById("tables-grid").innerHTML = tables.map(t => `
        <div class="table-chip ${t.status}">
          ${escapeHtml(t.tableNumber)}
          <div class="table-status">${t.status.toLowerCase()}</div>
        </div>
      `).join("");
    } catch (err) {
      console.error("Failed to load tables", err);
    }
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  loadStats();
</script>
</body>
</html>
