<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sales Reports</title>
<style>
  :root {
    --bg: #14181a;
    --panel: #1d2326;
    --card: #232a2d;
    --border: #2a3033;
    --accent: #2d8f5f;
    --accent2: #ff6a3d;
    --warn: #e0a72e;
    --muted: #8a9296;
    --font-display: 'Courier New', monospace;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); font-family: var(--font-body); color: #eee; min-height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; background: var(--panel);
    border-bottom: 3px solid var(--accent); flex-wrap: wrap; gap: 10px;
  }
  header h1 { font-family: var(--font-display); letter-spacing: 2px; font-size: 18px; margin: 0; text-transform: uppercase; }
  .header-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  /* ---- Filter bar ---- */
  .filter-bar {
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 14px 24px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .filter-bar label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .filter-bar input {
    padding: 7px 10px; border-radius: 5px; border: 1px solid var(--border);
    background: var(--card); color: #eee; font-size: 13px;
  }
  .preset-btns { display: flex; gap: 6px; margin-left: 8px; }
  .preset-btn {
    padding: 6px 12px; border-radius: 5px; border: 1px solid var(--border);
    background: var(--card); color: var(--muted); font-size: 12px; cursor: pointer;
  }
  .preset-btn:hover, .preset-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .btn {
    padding: 8px 16px; border-radius: 5px; border: none;
    font-size: 13px; cursor: pointer; font-family: var(--font-body); font-weight: 600;
  }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { background: #1f6e47; }
  .btn-ghost { background: #2a3336; color: #eee; }
  .btn-ghost:hover { background: #333d41; }

  /* ---- Main ---- */
  .main { padding: 24px; }

  .empty-state { text-align: center; color: var(--muted); padding: 80px 20px; font-size: 14px; }

  /* ---- KPI row ---- */
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .kpi {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 18px; position: relative; overflow: hidden;
  }
  .kpi::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--kpi-color, var(--accent)); }
  .kpi .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 8px; }
  .kpi .value { font-family: var(--font-display); font-size: 24px; font-weight: bold; color: var(--kpi-color, var(--accent)); }
  .kpi .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ---- Grid ---- */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
  .grid-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 900px) { .grid-3 { grid-template-columns: 1fr; } }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .card h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin: 0 0 16px; }

  /* ---- Daily chart ---- */
  .chart-wrap { height: 160px; display: flex; align-items: flex-end; gap: 4px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
  .bar { width: 100%; background: var(--accent); border-radius: 3px 3px 0 0; min-height: 2px; position: relative; cursor: pointer; }
  .bar:hover::after {
    content: attr(data-label); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
    background: #000; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 3px;
    white-space: nowrap; margin-bottom: 4px; z-index: 10;
  }
  .bar-label { font-size: 9px; color: var(--muted); text-align: center; }

  /* ---- Payment breakdown ---- */
  .pay-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .pay-item:last-child { border-bottom: none; }
  .pay-method { font-weight: 600; font-size: 13px; min-width: 80px; }
  .pay-bar-wrap { flex: 1; height: 8px; background: var(--border); border-radius: 4px; }
  .pay-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; }
  .pay-amount { font-family: var(--font-display); font-size: 13px; color: var(--accent); min-width: 90px; text-align: right; }

  /* ---- Item breakdown ---- */
  .item-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .item-row:last-child { border-bottom: none; }
  .item-rank { font-family: var(--font-display); font-size: 16px; color: var(--border); min-width: 24px; }
  .item-rank.r1 { color: #f7c948; }
  .item-rank.r2 { color: #b0b8bf; }
  .item-rank.r3 { color: #cd7f32; }
  .item-name { flex: 1; font-size: 13px; }
  .item-qty { font-size: 12px; color: var(--muted); min-width: 40px; text-align: center; }
  .item-rev { font-family: var(--font-display); font-size: 13px; color: var(--accent); min-width: 90px; text-align: right; }
  .item-bar-wrap { width: 80px; height: 5px; background: var(--border); border-radius: 3px; }
  .item-bar-fill { height: 100%; background: var(--accent2); border-radius: 3px; }

  /* ---- Orders table ---- */
  .orders-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .orders-table th { text-align: left; border-bottom: 1px solid var(--border); padding: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
  .orders-table td { padding: 9px 8px; border-bottom: 1px solid #1e2528; }
  .orders-table tr:hover td { background: #1e2528; }
  .method-tag { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 3px; background: #1f3a2a; color: #6fcf97; }
  .tbl-scroll { overflow-x: auto; }
</style>
</head>
<body>

<header>
  <h1>📈 Sales Reports</h1>
  <div class="header-right">
    <button class="btn btn-ghost" onclick="exportCSV()">⬇️ Export CSV</button>
    <button class="btn btn-ghost" onclick="window.print()">🖨️ Print</button>
    <button class="btn btn-ghost" onclick="logout()">Logout</button>
  </div>
</header>

<div class="filter-bar">
  <label>From</label>
  <input type="date" id="from-date" />
  <label>To</label>
  <input type="date" id="to-date" />
  <div class="preset-btns">
    <div class="preset-btn" onclick="setPreset('today')">Today</div>
    <div class="preset-btn" onclick="setPreset('week')">This Week</div>
    <div class="preset-btn" onclick="setPreset('month')">This Month</div>
    <div class="preset-btn" onclick="setPreset('last_month')">Last Month</div>
  </div>
  <button class="btn btn-accent" onclick="loadReport()">Generate</button>
</div>

<div class="main" id="main">
  <div class="empty-state">Select a date range above and click <strong>Generate</strong> to view your sales report.</div>
</div>

<script>
  const API_BASE = "http://localhost:3000";
  const TOKEN = localStorage.getItem("pos_token");
  if (!TOKEN) window.location.href = "/";

  let reportData = null;

  function logout() {
    localStorage.removeItem("pos_token");
    localStorage.removeItem("pos_role");
    localStorage.removeItem("pos_user");
    window.location.href = "/Projects%202026/restaurant-pos/public/index.html";
  }

  // ---- Presets ----
  function setPreset(preset) {
    document.querySelectorAll(".preset-btn").forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");

    const today = new Date();
    const fmt = d => d.toISOString().slice(0, 10);

    if (preset === "today") {
      document.getElementById("from-date").value = fmt(today);
      document.getElementById("to-date").value = fmt(today);
    } else if (preset === "week") {
      const start = new Date(today);
      start.setDate(today.getDate() - today.getDay());
      document.getElementById("from-date").value = fmt(start);
      document.getElementById("to-date").value = fmt(today);
    } else if (preset === "month") {
      const start = new Date(today.getFullYear(), today.getMonth(), 1);
      document.getElementById("from-date").value = fmt(start);
      document.getElementById("to-date").value = fmt(today);
    } else if (preset === "last_month") {
      const start = new Date(today.getFullYear(), today.getMonth() - 1, 1);
      const end = new Date(today.getFullYear(), today.getMonth(), 0);
      document.getElementById("from-date").value = fmt(start);
      document.getElementById("to-date").value = fmt(end);
    }

    loadReport();
  }

  // Set default to today
  const todayStr = new Date().toISOString().slice(0, 10);
  document.getElementById("from-date").value = todayStr;
  document.getElementById("to-date").value = todayStr;

  async function loadReport() {
    const from = document.getElementById("from-date").value;
    const to = document.getElementById("to-date").value;
    if (!from || !to) return;

    document.getElementById("main").innerHTML = `<div class="empty-state">Loading report…</div>`;

    try {
      const res = await fetch(`${API_BASE}/reports/sales?from=${from}&to=${to}`, {
        headers: { Authorization: `Bearer ${TOKEN}` }
      });
      reportData = await res.json();
      renderReport(reportData);
    } catch (err) {
      document.getElementById("main").innerHTML = `<div class="empty-state">Failed to load report.</div>`;
    }
  }

  function renderReport(data) {
    const { summary, paymentBreakdown, itemBreakdown, dailyBreakdown, orders } = data;
    const main = document.getElementById("main");

    // KPIs
    const kpiHtml = `
      <div class="kpi-row">
        <div class="kpi" style="--kpi-color:var(--accent)">
          <div class="label">Total Revenue</div>
          <div class="value">₱${summary.totalRevenue.toFixed(2)}</div>
          <div class="sub">net of discount</div>
        </div>
        <div class="kpi" style="--kpi-color:#4a9edd">
          <div class="label">Total Orders</div>
          <div class="value">${summary.totalOrders}</div>
          <div class="sub">paid & completed</div>
        </div>
        <div class="kpi" style="--kpi-color:var(--warn)">
          <div class="label">Avg. Ticket</div>
          <div class="value">₱${summary.totalOrders ? (summary.totalRevenue / summary.totalOrders).toFixed(2) : "0.00"}</div>
          <div class="sub">per order</div>
        </div>
        <div class="kpi" style="--kpi-color:#9b9ef7">
          <div class="label">VAT Collected</div>
          <div class="value">₱${summary.totalVAT.toFixed(2)}</div>
          <div class="sub">12% VAT</div>
        </div>
        <div class="kpi" style="--kpi-color:var(--accent2)">
          <div class="label">Total Discounts</div>
          <div class="value">₱${summary.totalDiscount.toFixed(2)}</div>
          <div class="sub">given out</div>
        </div>
      </div>
    `;

    // Daily chart
    const maxRev = Math.max(...dailyBreakdown.map(d => d.revenue), 1);
    const chartHtml = dailyBreakdown.length ? `
      <div class="chart-wrap">
        ${dailyBreakdown.map(d => `
          <div class="bar-col">
            <div class="bar" style="height:${Math.max(4, (d.revenue / maxRev) * 150)}px"
              data-label="₱${d.revenue.toFixed(0)} (${d.orders} orders)"></div>
            <div class="bar-label">${d.date.slice(5)}</div>
          </div>
        `).join("")}
      </div>
    ` : `<div style="color:var(--muted);font-size:13px;padding:20px 0">No data for this range.</div>`;

    // Payment breakdown
    const maxPay = Math.max(...Object.values(paymentBreakdown), 1);
    const payHtml = Object.entries(paymentBreakdown).length ? Object.entries(paymentBreakdown).map(([method, amount]) => `
      <div class="pay-item">
        <div class="pay-method">${method}</div>
        <div class="pay-bar-wrap"><div class="pay-bar-fill" style="width:${(amount / maxPay) * 100}%"></div></div>
        <div class="pay-amount">₱${Number(amount).toFixed(2)}</div>
      </div>
    `).join("") : `<div style="color:var(--muted);font-size:13px">No payments recorded.</div>`;

    // Item breakdown
    const maxItemRev = Math.max(...itemBreakdown.map(i => i.revenue), 1);
    const itemHtml = itemBreakdown.length ? itemBreakdown.slice(0, 10).map((item, idx) => `
      <div class="item-row">
        <div class="item-rank ${idx === 0 ? 'r1' : idx === 1 ? 'r2' : idx === 2 ? 'r3' : ''}">#${idx + 1}</div>
        <div class="item-name">${escapeHtml(item.name)}</div>
        <div class="item-qty">${item.quantity}×</div>
        <div class="item-bar-wrap"><div class="item-bar-fill" style="width:${(item.revenue / maxItemRev) * 100}%"></div></div>
        <div class="item-rev">₱${item.revenue.toFixed(2)}</div>
      </div>
    `).join("") : `<div style="color:var(--muted);font-size:13px">No items sold.</div>`;

    // Orders table
    const ordersHtml = orders.length ? `
      <div class="tbl-scroll">
        <table class="orders-table">
          <thead>
            <tr>
              <th>Time</th>
              <th>Table</th>
              <th>Type</th>
              <th>Items</th>
              <th>Cashier</th>
              <th>Payment</th>
              <th style="text-align:right">Total</th>
            </tr>
          </thead>
          <tbody>
            ${orders.map(o => {
              const time = new Date(o.updatedAt).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
              const table = o.table ? `T${o.table.tableNumber}` : "—";
              const method = o.payments[0] ? o.payments[0].method : "—";
              const itemCount = o.orderItems.reduce((s, i) => s + i.quantity, 0);
              return `
                <tr>
                  <td>${time}</td>
                  <td>${escapeHtml(table)}</td>
                  <td>${escapeHtml(o.orderType.replace("_", " "))}</td>
                  <td>${itemCount} item${itemCount !== 1 ? "s" : ""}</td>
                  <td>${escapeHtml(o.user.name)}</td>
                  <td><span class="method-tag">${escapeHtml(method)}</span></td>
                  <td style="text-align:right;font-family:var(--font-display)">₱${Number(o.totalAmount).toFixed(2)}</td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      </div>
    ` : `<div style="color:var(--muted);font-size:13px">No orders in this range.</div>`;

    main.innerHTML = `
      ${kpiHtml}
      <div class="grid-2">
        <div class="card"><h2>Daily Revenue</h2>${chartHtml}</div>
        <div class="card"><h2>Payment Methods</h2>${payHtml}</div>
      </div>
      <div class="grid-3">
        <div class="card"><h2>Top Selling Items</h2>${itemHtml}</div>
        <div class="card">
          <h2>Summary</h2>
          <div style="font-size:13px;line-height:2">
            <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Period</span><span>${summary.fromDate} → ${summary.toDate}</span></div>
            <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Gross Sales</span><span>₱${(summary.totalRevenue + summary.totalDiscount).toFixed(2)}</span></div>
            <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Less Discounts</span><span>-₱${summary.totalDiscount.toFixed(2)}</span></div>
            <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Net Sales</span><span>₱${(summary.totalRevenue - summary.totalVAT).toFixed(2)}</span></div>
            <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Output VAT</span><span>₱${summary.totalVAT.toFixed(2)}</span></div>
            <div style="border-top:1px solid var(--border);margin:8px 0"></div>
            <div style="display:flex;justify-content:space-between;font-weight:bold"><span>Total Revenue</span><span style="color:var(--accent)">₱${summary.totalRevenue.toFixed(2)}</span></div>
          </div>
        </div>
      </div>
      <div class="card"><h2>All Orders (${orders.length})</h2>${ordersHtml}</div>
    `;
  }

  // ---- CSV Export ----
  function exportCSV() {
    if (!reportData) { alert("Generate a report first."); return; }

    const { summary, itemBreakdown, orders } = reportData;
    const lines = [];

    lines.push(`SALES REPORT`);
    lines.push(`Period,${summary.fromDate} to ${summary.toDate}`);
    lines.push(`Total Orders,${summary.totalOrders}`);
    lines.push(`Total Revenue,₱${summary.totalRevenue.toFixed(2)}`);
    lines.push(`Total VAT,₱${summary.totalVAT.toFixed(2)}`);
    lines.push(`Total Discounts,₱${summary.totalDiscount.toFixed(2)}`);
    lines.push(``);

    lines.push(`ITEM BREAKDOWN`);
    lines.push(`Item,Quantity Sold,Revenue`);
    itemBreakdown.forEach(item => {
      lines.push(`"${item.name}",${item.quantity},₱${item.revenue.toFixed(2)}`);
    });
    lines.push(``);

    lines.push(`ORDER DETAILS`);
    lines.push(`Date,Time,Table,Order Type,Cashier,Payment Method,Total`);
    orders.forEach(o => {
      const dt = new Date(o.updatedAt);
      const date = dt.toLocaleDateString("en-PH");
      const time = dt.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      const table = o.table ? o.table.tableNumber : "—";
      const method = o.payments[0] ? o.payments[0].method : "—";
      lines.push(`${date},${time},"${table}","${o.orderType}","${o.user.name}","${method}",₱${Number(o.totalAmount).toFixed(2)}`);
    });

    const csv = lines.join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `sales-report-${summary.fromDate}-to-${summary.toDate}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function escapeHtml(str) {
    if (!str) return "";
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }
</script>
</body>
</html>
